<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Trip'Potes — Organisez vos vacances entre potes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4f6"/>
      <stop offset="1" stop-color="#eef9ff"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5a7e"/>
      <stop offset="0.55" stop-color="#7b6cff"/>
      <stop offset="1" stop-color="#1fd1c6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="120" cy="110" r="160" fill="#ff5a7e" opacity="0.18"/>
  <circle cx="1080" cy="540" r="190" fill="#1fd1c6" opacity="0.18"/>
  <circle cx="1040" cy="120" r="90" fill="#ffc24b" opacity="0.25"/>
  <text x="90" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#7b6cff" letter-spacing="2">🌴 TRIP'POTES</text>
