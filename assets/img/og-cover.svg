  <text x="86" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="84" font-weight="800" fill="url(#grad)">entre potes 🎉</text>
  <text x="90" y="480" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#4b4361">Partage des dépenses · Vote des activités · Suggestions par destination</text>
